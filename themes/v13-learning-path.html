<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 工具图鉴 v13 · 学习成长路径版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root {
  --bg: #fafbfc;
  --bg-card: #fff;
  --primary: #7c3aed;
  --primary-light: #f5f3ff;
  --primary-mid: #ddd6fe;
  --green: #059669;
  --green-light: #ecfdf5;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --orange: #d97706;
  --orange-light: #fffbeb;
  --red: #dc2626;
  --text: #111827;
  --text-sub: #6b7280;
  --text-dim: #9ca3af;
  --border: #e5e7eb;
  --shadow: 0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.07);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.1);
  --radius: 12px;
  --radius-sm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--text);}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;border:none;cursor:pointer;background:none;}

/* NAV */
.nav{position:sticky;top:0;z-index:300;height:58px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;box-shadow:var(--shadow);}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;flex-shrink:0;}
.nav-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#7c3aed,#2563eb);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.nav-search{flex:1;max-width:300px;display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:0 14px;height:36px;}
.nav-search input{background:none;border:none;outline:none;font-size:13px;color:var(--text);width:100%;}
.nav-search input::placeholder{color:var(--text-dim);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-level-toggle{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px;}
.level-btn{font-size:12px;font-weight:600;padding:4px 12px;border-radius:16px;color:var(--text-sub);transition:all .15s;cursor:pointer;}
.level-btn.active{background:#fff;color:var(--text);box-shadow:var(--shadow);}
.token-link{font-size:12.5px;font-weight:600;padding:6px 14px;border-radius:20px;background:var(--primary-light);color:var(--primary);transition:all .2s;white-space:nowrap;}
.token-link:hover{background:var(--primary);color:#fff;}

/* HERO */
.hero{text-align:center;padding:48px 24px 0;max-width:760px;margin:0 auto;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--primary);background:var(--primary-light);border-radius:20px;padding:5px 14px;margin-bottom:18px;}
.hero h1{font-size:clamp(24px,4vw,38px);font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-bottom:12px;}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--primary),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{font-size:14.5px;color:var(--text-sub);line-height:1.7;margin-bottom:40px;}

/* PROGRESS BAR */
.progress-section{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:200;}
.progress-inner{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;}
.progress-label{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;}
.progress-steps{display:flex;align-items:center;gap:0;flex:1;overflow-x:auto;scrollbar-width:none;}
.progress-steps::-webkit-scrollbar{display:none;}
.prog-step{display:flex;align-items:center;flex-shrink:0;}
.prog-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:2px solid var(--border);background:#fff;color:var(--text-dim);transition:all .2s;cursor:pointer;flex-shrink:0;}
.prog-dot.done{background:var(--green);border-color:var(--green);color:#fff;}
.prog-dot.active{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 0 0 4px var(--primary-light);}
.prog-line{width:40px;height:2px;background:var(--border);flex-shrink:0;}
.prog-line.done{background:var(--green);}
.prog-info{margin-left:16px;flex-shrink:0;}
.prog-title{font-size:12px;font-weight:700;color:var(--text);}
.prog-sub{font-size:11px;color:var(--text-sub);}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}

/* LEVEL SECTIONS */
.level-section{margin-bottom:48px;}
.level-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding:18px 20px;border-radius:var(--radius);border:2px solid;}
.level-num{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0;}
.level-title-wrap{flex:1;}
.level-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.level-sub{font-size:13px;line-height:1.5;}
.level-badge{font-size:11.5px;font-weight:700;padding:5px 14px;border-radius:20px;flex-shrink:0;}

/* 入门级 */
.level-beginner .level-header{background:var(--green-light);border-color:#a7f3d0;}
.level-beginner .level-num{background:var(--green);color:#fff;}
.level-beginner .level-title{color:var(--green);}
.level-beginner .level-badge{background:var(--green);color:#fff;}

/* 进阶级 */
.level-intermediate .level-header{background:var(--blue-light);border-color:#bfdbfe;}
.level-intermediate .level-num{background:var(--blue);color:#fff;}
.level-intermediate .level-title{color:var(--blue);}
.level-intermediate .level-badge{background:var(--blue);color:#fff;}

/* 专家级 */
.level-expert .level-header{background:var(--primary-light);border-color:var(--primary-mid);}
.level-expert .level-num{background:var(--primary);color:#fff;}
.level-expert .level-title{color:var(--primary);}
.level-expert .level-badge{background:var(--primary);color:#fff;}

/* TOOL CARDS IN LEARNING */
.tool-row{display:flex;flex-direction:column;gap:12px;}
.learn-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;}
.learn-card:hover{box-shadow:var(--shadow-md);border-color:transparent;}
.learn-card-header{display:flex;align-items:flex-start;gap:14px;padding:18px 20px;cursor:pointer;}
.learn-card-icon{width:46px;height:46px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.learn-card-main{flex:1;min-width:0;}
.learn-card-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.learn-card-name{font-size:15px;font-weight:700;color:var(--text);}
.learn-card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.learn-card-desc{font-size:13px;color:var(--text-sub);line-height:1.6;margin-top:4px;}
.learn-card-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.learn-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:7px 14px;border-radius:8px;transition:all .2s;white-space:nowrap;}
.learn-btn-primary{background:var(--primary);color:#fff;}
.learn-btn-primary:hover{opacity:.9;}
.learn-btn-ghost{border:1.5px solid var(--border);color:var(--text-sub);}
.learn-btn-ghost:hover{border-color:var(--primary);color:var(--primary);}

/* 展开面板 */
.learn-card-body{display:none;padding:0 20px 20px;border-top:1px solid var(--border);}
.learn-card.open .learn-card-body{display:block;}
.learn-card-body-inner{padding-top:16px;}
.learn-body-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.learn-col-title{font-size:10.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.km-article-list{display:flex;flex-direction:column;gap:7px;}
.km-article{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:12.5px;color:var(--text-sub);transition:all .15s;text-decoration:none;}
.km-article:hover{background:var(--primary-light);border-color:var(--primary-mid);color:var(--primary);}
.km-article-icon{flex-shrink:0;margin-top:1px;}
.tips-list{display:flex;flex-direction:column;gap:7px;}
.tip-item{display:flex;gap:8px;font-size:12.5px;color:var(--text-sub);line-height:1.5;}
.tip-num{width:20px;height:20px;border-radius:50%;background:var(--primary-light);color:var(--primary);font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}

/* CHECKLIST */
.checklist{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:28px;}
.checklist-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
.check-item{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-sub);padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);transition:all .15s;cursor:pointer;}
.check-item:hover{border-color:var(--green);color:var(--green);background:var(--green-light);}
.check-item.checked{border-color:var(--green);background:var(--green-light);color:var(--green);}
.check-box{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--text-dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;}
.check-item.checked .check-box{background:var(--green);border-color:var(--green);color:#fff;}

/* TAG styles */
.tag{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:5px;}
.tag-inner{background:#eff6ff;color:#3b82f6;}
.tag-free{background:#f0fdf4;color:#16a34a;}
.tag-hot{background:#fff7ed;color:#ea580c;}
.tag-new{background:#faf5ff;color:#7c3aed;}
.tag-claw{background:#fff0f3;color:#e11d48;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;transform:scale(.96) translateY(14px);transition:transform .25s;}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal-header{padding:22px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:13px;position:sticky;top:0;background:#fff;z-index:1;}
.modal-icon{width:50px;height:50px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);}
.modal-meta{flex:1;}
.modal-name{font-size:17px;font-weight:800;}
.modal-tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg);color:var(--text-sub);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;transition:all .2s;}
.modal-close:hover{background:#fee2e2;color:var(--red);}
.modal-body{padding:20px 22px 24px;}
.modal-desc{font-size:13.5px;color:var(--text-sub);line-height:1.8;margin-bottom:18px;}
.modal-section{font-size:10.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;}
.modal-links-list{display:flex;flex-direction:column;gap:7px;margin-bottom:18px;}
.modal-link{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);transition:all .2s;text-decoration:none;}
.modal-link:hover{border-color:var(--primary);background:var(--primary-light);}
.modal-link.p{border-color:var(--primary);}
.modal-link-icon{width:30px;height:30px;border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;border:1px solid var(--border);}
.modal-link-body{flex:1;min-width:0;}
.modal-link-label{font-size:13px;font-weight:600;color:var(--text);}
.modal-link-url{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-link-arrow{color:var(--primary);}
.modal-tip-box{background:var(--primary-light);border-radius:var(--radius-sm);padding:13px;border:1px solid var(--primary-mid);}
.modal-tip-box-label{font-size:10.5px;font-weight:700;color:var(--primary);margin-bottom:5px;}
.modal-tip-box-text{font-size:12.5px;color:var(--text-sub);line-height:1.65;}

mark{background:rgba(124,58,237,.15);color:#7c3aed;border-radius:3px;padding:0 2px;}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:20px;text-align:center;font-size:12px;color:var(--text-dim);}
.footer a{color:var(--primary);}

@media(max-width:768px){
  .learn-body-grid{grid-template-columns:1fr;}
  .learn-card-actions{flex-direction:column;align-items:flex-end;}
  .check-grid{grid-template-columns:1fr 1fr;}
  .progress-inner{gap:8px;}
}
@media(max-width:480px){
  .learn-card-header{flex-wrap:wrap;}
  .check-grid{grid-template-columns:1fr;}
}
</style>
</head>

   fullDesc:'With（with.woa.com）输入描述即可生成可交互的 HTML 网页。不需要任何编程基础，特别适合运营同学：快速制作活动落地页原型、数据可视化看板、可分享的信息图页面。',
   links:[{label:'🚀 立即打开 With',url:'https://with.woa.com',icon:'🌐',primary:true}],
   tip:'With 最适合"我需要一个简单的活动报名页 / 数据展示页"这类需求，说清楚要什么，30 秒出可交互原型。',
   kmArticles:[{title:'With 工具 AI 网页生成实战教程',url:'https://with.woa.com'}],
   tips30:['用 With 生成一个直播活动倒计时页面','测试修改需求描述后页面如何自动更新','把生成的页面链接分享给团队成员体验']}
];

const LEVELS = {
  beginner:{label:'入门级',sub:'第 1-2 周 · 建立 AI 工具使用习惯',badge:'新手必修',emoji:'🌱',step:'5 个工具'},
  intermediate:{label:'进阶级',sub:'第 3-4 周 · 掌握核心专业工具',badge:'效率提升',emoji:'🚀',step:'9 个工具'},
  expert:{label:'专家级',sub:'第 5 周起 · 搭建自动化工作流',badge:'高手解锁',emoji:'⚡',step:'7 个工具'}
};

let currentLevel = 'all';
let checkedTools = new Set(JSON.parse(localStorage.getItem('ai-tools-checked') || '[]'));
let searchQuery = '';

function saveChecked() {
  localStorage.setItem('ai-tools-checked', JSON.stringify([...checkedTools]));
}

function renderChecklist() {
  const grid = document.getElementById('checkGrid');
  const all = TOOLS_DATA;
  grid.innerHTML = all.map(t => {
    const done = checkedTools.has(t.id);
    return `<div class="check-item ${done?'checked':''}" onclick="toggleCheck('${t.id}',this)">
      <div class="check-box">${done?'✓':''}</div>
      <span>${t.icon} ${t.name}</span>
    </div>`;
  }).join('');
  updateProgress();
}

window.toggleCheck = function(id, el) {
  if (checkedTools.has(id)) { checkedTools.delete(id); el.classList.remove('checked'); el.querySelector('.check-box').textContent=''; }
  else { checkedTools.add(id); el.classList.add('checked'); el.querySelector('.check-box').textContent='✓'; }
  saveChecked();
  updateProgress();
};

function updateProgress() {
  const total = TOOLS_DATA.length;
  const done = checkedTools.size;
  document.getElementById('progTitle').textContent = `已掌握 ${done} / ${total} 个工具`;
  document.getElementById('progSub').textContent = done===0 ? '开始解锁第一个工具 →' : done<5 ? '继续！完成入门阶段还差 '+(5-done)+' 个' : done<14 ? '进入进阶阶段！' : done<total ? '即将成为专家！还差 '+(total-done)+' 个' : '🎉 全部掌握！你是 AI 达人！';
  // 进度步骤
  const steps = TOOLS_DATA.map((t,i) => ({ done: checkedTools.has(t.id), id: t.id, icon: t.icon }));
  const stepsEl = document.getElementById('progressSteps');
  stepsEl.innerHTML = steps.map((s,i) => `
    <div class="prog-step">
      <div class="prog-dot ${s.done?'done':i===steps.findIndex(x=>!x.done)?'active':''}">${s.done?'✓':s.icon}</div>
      ${i<steps.length-1?`<div class="prog-line ${s.done?'done':''}"></div>`:''}
    </div>`).join('');
}

function renderLevels() {
  const q = searchQuery.toLowerCase().trim();
  const container = document.getElementById('levelSections');
  const levelsToShow = currentLevel==='all' ? ['beginner','intermediate','expert'] : [currentLevel];
  container.innerHTML = levelsToShow.map(lv => {
    const info = LEVELS[lv];
    const tools = TOOLS_DATA.filter(t => {
      if (t.level !== lv) return false;
      if (!q) return true;
      return [t.name, t.desc, ...(t.tags||[]).map(x=>x.text)].some(s=>s.toLowerCase().includes(q));
    });
    if (tools.length === 0) return '';
    return `<div class="level-section level-${lv}" id="level-${lv}">
      <div class="level-header">
        <div class="level-num">${info.emoji}</div>
        <div class="level-title-wrap">
          <div class="level-title">${info.label}</div>
          <div class="level-sub">${info.sub}</div>
        </div>
        <span class="level-badge">${info.badge} · ${tools.length} 个工具</span>
      </div>
      <div class="tool-row">${tools.map(t=>buildLearnCard(t,q)).join('')}</div>
    </div>`;
  }).join('');
  // 绑定展开事件
  document.querySelectorAll('.learn-card-header').forEach(header => {
    header.addEventListener('click', () => {
      const card = header.closest('.learn-card');
      card.classList.toggle('open');
    });
  });
}

function buildLearnCard(tool, q) {
  const tags = (tool.tags||[]).map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join('');
  const done = checkedTools.has(tool.id);
  const kmHtml = (tool.kmArticles||[]).map(a=>`
    <a class="km-article" href="${a.url}" target="_blank" rel="noopener">
      <span class="km-article-icon">📖</span>
      <span>${a.title}</span>
    </a>`).join('');
  const tipsHtml = (tool.tips30||[]).map((tip,i)=>`
    <div class="tip-item">
      <div class="tip-num">${i+1}</div>
      <div>${tip}</div>
    </div>`).join('');
  return `<div class="learn-card" style="border-color:${done?'var(--green)':''};background:${done?'var(--green-light)':'#fff'};" id="lc-${tool.id}">
    <div class="learn-card-header">
      <div class="learn-card-icon" style="background:${tool.color};">${tool.icon}</div>
      <div class="learn-card-main">
        <div class="learn-card-name-row">
          <span class="learn-card-name">${tool.name}</span>
          ${done?'<span style="font-size:11px;font-weight:700;color:var(--green);background:var(--green-light);padding:2px 8px;border-radius:10px;">✓ 已掌握</span>':''}
        </div>
        <div class="learn-card-tags">${tags}</div>
        <div class="learn-card-desc">${tool.desc}</div>
      </div>
      <div class="learn-card-actions">
        <a class="learn-btn learn-btn-primary" href="${tool.links[0].url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🚀 打开</a>
        <button class="learn-btn learn-btn-ghost" onclick="event.stopPropagation();showModal('${tool.id}')">详情</button>
        <button class="learn-btn learn-btn-ghost" onclick="event.stopPropagation();markDone('${tool.id}')" style="${done?'border-color:var(--green);color:var(--green);':''}">${done?'✓ 已掌握':'标记完成'}</button>
      </div>
    </div>
    <div class="learn-card-body">
      <div class="learn-card-body-inner">
        <div class="learn-body-grid">
          <div>
            <div class="learn-col-title">📖 KM 实践文章</div>
            <div class="km-article-list">${kmHtml||'<div style="font-size:12px;color:var(--text-dim);">暂无相关文章</div>'}</div>
          </div>
          <div>
            <div class="learn-col-title">🎯 30 分钟上手任务</div>
            <div class="tips-list">${tipsHtml}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

window.markDone = function(id) {
  if (checkedTools.has(id)) { checkedTools.delete(id); }
  else { checkedTools.add(id); }
  saveChecked();
  renderChecklist();
  renderLevels();
  updateProgress();
};

function filterLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.dataset.level===level));
  renderLevels();
}
window.filterLevel = filterLevel;

document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value;
  renderLevels();
});

// Modal
const overlay = document.getElementById('modalOverlay');
window.showModal = function(id) {
  const t = TOOLS_DATA.find(x=>x.id===id);
  if (!t) return;
  document.getElementById('modalIcon').textContent = t.icon;
  document.getElementById('modalIcon').style.background = t.color;
  document.getElementById('modalName').textContent = t.name;
  document.getElementById('modalTags').innerHTML = (t.tags||[]).map(tg=>`<span class="tag ${tg.cls}">${tg.text}</span>`).join('');
  document.getElementById('modalDesc').textContent = t.fullDesc;
  document.getElementById('modalTip').textContent = t.tip;
  document.getElementById('modalLinks').innerHTML = t.links.map((l,i)=>`
    <a class="modal-link ${i===0?'p':''}" href="${l.url}" target="_blank" rel="noopener">
      <div class="modal-link-icon">${l.icon}</div>
      <div class="modal-link-body"><div class="modal-link-label">${l.label}</div><div class="modal-link-url">${l.url}</div></div>
      <div class="modal-link-arrow">↗</div>
    </a>`).join('');
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
};
document.getElementById('modalClose').addEventListener('click',()=>{overlay.classList.remove('open');document.body.style.overflow='';});
overlay.addEventListener('click',e=>{if(e.target===overlay){overlay.classList.remove('open');document.body.style.overflow='';}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){overlay.classList.remove('open');document.body.style.overflow='';}});

// INIT
renderChecklist();
renderLevels();
</script>
</body>
</html>
