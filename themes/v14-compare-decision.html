<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 工具图鉴 v14 · 对比决策版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root {
  --bg: #f8f9fb;
  --card: #fff;
  --primary: #2563eb;
  --primary-light: #eff6ff;
  --primary-mid: #bfdbfe;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --orange: #ea580c;
  --orange-light: #fff7ed;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --red: #dc2626;
  --red-light: #fef2f2;
  --text: #111827;
  --text-sub: #6b7280;
  --text-dim: #9ca3af;
  --border: #e5e7eb;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 14px rgba(0,0,0,.08);
  --radius: 12px;
  --radius-sm: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,"PingFang SC",sans-serif;background:var(--bg);color:var(--text);}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;border:none;cursor:pointer;background:none;}

/* NAV */
.nav{position:sticky;top:0;z-index:300;height:58px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;box-shadow:var(--shadow);}
.nav-logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px;flex-shrink:0;}
.nav-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-btn{font-size:12.5px;font-weight:600;padding:6px 14px;border-radius:20px;background:var(--primary-light);color:var(--primary);white-space:nowrap;transition:all .2s;}
.nav-btn:hover{background:var(--primary);color:#fff;}

/* HERO */
.hero{text-align:center;padding:44px 24px 0;max-width:700px;margin:0 auto;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--primary);background:var(--primary-light);border-radius:20px;padding:5px 14px;margin-bottom:16px;}
.hero h1{font-size:clamp(22px,4vw,36px);font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-bottom:10px;}
.hero h1 em{font-style:normal;color:var(--primary);}
.hero-sub{font-size:14px;color:var(--text-sub);line-height:1.7;margin-bottom:32px;}

/* COMPARE SELECT AREA */
.compare-area{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:200;}
.compare-inner{max-width:1100px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px;}
.compare-label{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;}
.compare-selected{display:flex;gap:7px;flex:1;overflow-x:auto;scrollbar-width:none;}
.compare-selected::-webkit-scrollbar{display:none;}
.compare-chip{display:flex;align-items:center;gap:6px;background:var(--primary-light);border:1.5px solid var(--primary-mid);border-radius:20px;padding:5px 10px 5px 12px;font-size:12.5px;font-weight:600;color:var(--primary);flex-shrink:0;}
.compare-chip-remove{width:16px;height:16px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;flex-shrink:0;}
.compare-empty{font-size:12px;color:var(--text-dim);font-style:italic;}
.compare-action{display:flex;gap:8px;flex-shrink:0;}
.compare-btn{font-size:12.5px;font-weight:700;padding:7px 16px;border-radius:20px;transition:all .2s;white-space:nowrap;}
.compare-btn-primary{background:var(--primary);color:#fff;}
.compare-btn-primary:hover{background:#1d4ed8;}
.compare-btn-ghost{border:1.5px solid var(--border);color:var(--text-sub);}
.compare-btn-ghost:hover{border-color:var(--primary);color:var(--primary);}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:28px 24px 80px;}

/* GROUP TABS */
.group-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:24px;padding-bottom:2px;}
.group-tabs::-webkit-scrollbar{display:none;}
.group-tab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);color:var(--text-sub);background:#fff;transition:all .2s;cursor:pointer;}
.group-tab:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.group-tab.active{background:var(--primary);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(37,99,235,.35);}

/* GROUP SECTION */
.group-section{margin-bottom:40px;}
.group-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.group-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.group-title{font-size:16px;font-weight:800;color:var(--text);}
.group-sub{font-size:12.5px;color:var(--text-sub);margin-top:2px;}
.group-count{font-size:11.5px;color:var(--text-dim);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px;margin-left:auto;}

/* TOOL CARDS GRID */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.tool-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;position:relative;}
.tool-card:hover{box-shadow:var(--shadow-md);}
.tool-card.selected{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}
.select-overlay{position:absolute;top:10px;right:10px;z-index:2;}
.select-checkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.select-checkbox.checked{background:var(--primary);border-color:var(--primary);}
.select-checkbox .check-mark{color:#fff;font-size:12px;display:none;}
.select-checkbox.checked .check-mark{display:block;}
.card-top{display:flex;align-items:flex-start;gap:11px;padding:16px 16px 0;}
.card-icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);}
.card-head{flex:1;min-width:0;padding-right:24px;}
.card-name{font-size:14px;font-weight:700;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-tag-row{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;}
.tag-inner{background:#eff6ff;color:#3b82f6;}
.tag-free{background:#f0fdf4;color:#16a34a;}
.tag-hot{background:#fff7ed;color:#ea580c;}
.tag-new{background:#faf5ff;color:#7c3aed;}
.tag-claw{background:#fff0f3;color:#e11d48;}
.card-desc{font-size:12px;color:var(--text-sub);line-height:1.6;padding:10px 16px;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;}

/* SCORE BARS IN CARD */
.card-scores{padding:0 16px 14px;display:flex;flex-direction:column;gap:5px;}
.score-row{display:flex;align-items:center;gap:8px;}
.score-lbl{font-size:10.5px;color:var(--text-dim);width:48px;flex-shrink:0;}
.score-bar{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.score-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1);}
.score-val{font-size:10.5px;font-weight:700;width:14px;text-align:right;flex-shrink:0;}
.card-footer{display:flex;gap:8px;padding:0 16px 14px;}
.card-btn{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:7px;transition:all .2s;}
.card-btn-primary{background:var(--primary);color:#fff;flex:1;justify-content:center;}
.card-btn-primary:hover{background:#1d4ed8;}
.card-btn-ghost{border:1.5px solid var(--border);color:var(--text-sub);}
.card-btn-ghost:hover{border-color:var(--primary);color:var(--primary);}

/* COMPARE TABLE */
.compare-table-section{background:#fff;border:1.5px solid var(--primary-mid);border-radius:16px;padding:24px;margin-bottom:28px;box-shadow:0 4px 20px rgba(37,99,235,.1);}
.compare-table-title{font-size:16px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.compare-table{width:100%;border-collapse:collapse;}
.compare-table th{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;padding:10px 12px;border-bottom:2px solid var(--border);text-align:left;}
.compare-table th.tool-col{min-width:140px;}
.compare-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.compare-table tr:last-child td{border-bottom:none;}
.compare-table tr:hover td{background:var(--bg);}
.compare-row-label{font-size:11.5px;font-weight:700;color:var(--text-sub);}
.compare-val{font-size:13px;}
.star-fill{color:#f59e0b;font-size:13px;}
.star-empty{color:var(--text-dim);font-size:13px;}
.compare-tag{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:5px;margin-right:3px;}
.winner-badge{background:#fef3c7;color:#d97706;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;margin-left:6px;}
.score-dots{display:flex;gap:2px;}
.sdot-fill{width:10px;height:10px;border-radius:2px;background:var(--primary);}
.sdot-empty{width:10px;height:10px;border-radius:2px;background:var(--bg);border:1px solid var(--border);}
.recommend-banner{background:linear-gradient(135deg,var(--primary-light),var(--purple-light));border:1px solid var(--primary-mid);border-radius:10px;padding:14px 16px;margin-top:16px;display:flex;gap:12px;align-items:flex-start;}
.recommend-icon{font-size:20px;flex-shrink:0;}
.recommend-text{font-size:12.5px;color:var(--text-sub);line-height:1.6;}
.recommend-text strong{color:var(--primary);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:18px;box-shadow:var(--shadow-md);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;transform:scale(.96) translateY(14px);transition:transform .25s;}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;position:sticky;top:0;background:#fff;}
.modal-icon{width:48px;height:48px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);}
.modal-meta{flex:1;}.modal-name{font-size:16px;font-weight:800;}.modal-tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--bg);color:var(--text-sub);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;}
.modal-close:hover{background:#fee2e2;color:var(--red);}
.modal-body{padding:18px 20px 22px;}
.modal-desc{font-size:13px;color:var(--text-sub);line-height:1.75;margin-bottom:16px;}
.modal-label{font-size:10.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.modal-links{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
.modal-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);transition:border-color .15s;text-decoration:none;}
.modal-link:hover,.modal-link.p{border-color:var(--primary);}
.modal-link-icon{width:28px;height:28px;border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid var(--border);}
.modal-link-body{flex:1;min-width:0;}.modal-link-label{font-size:12.5px;font-weight:600;color:var(--text);}.modal-link-url{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-link-arrow{color:var(--primary);}
.modal-tip-box{background:var(--primary-light);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--primary-mid);}
.modal-tip-label{font-size:10.5px;font-weight:700;color:var(--primary);margin-bottom:5px;}
.modal-tip-text{font-size:12.5px;color:var(--text-sub);line-height:1.65;}

mark{background:rgba(37,99,235,.12);color:#2563eb;border-radius:2px;padding:0 2px;}
.footer{border-top:1px solid var(--border);padding:20px;text-align:center;font-size:12px;color:var(--text-dim);}
.footer a{color:var(--primary);}
@media(max-width:768px){.compare-inner{flex-wrap:wrap;}.tools-grid{grid-template-columns:1fr 1fr;}.compare-action{flex-direction:column;}}
@media(max-width:500px){.tools-grid{grid-template-columns:1fr;}}
</style>
</head>

const SCORE_LABELS = {scene:'场景适用',power:'功能强度',easy:'上手难度',collab:'协作支持',cost:'费用友好'};
const SCORE_COLORS = ['#10b981','#3b82f6','#f59e0b','#8b5cf6','#f43f5e'];

let selectedIds = [];
let currentGroup = 'all';

function filterGroup(group) {
  currentGroup = group;
  document.querySelectorAll('.group-tab').forEach(t => t.classList.toggle('active', t.dataset.group===group));
  renderToolGroups();
}

function getGroupedTools() {
  const tools = currentGroup==='all' ? TOOLS : TOOLS.filter(t=>t.group===currentGroup);
  const groups = {};
  const GINFO = {
    agent:{label:'AI Agent / 龙虾系',sub:'Agent 编排 · 自动化工作流 · AI 编程',icon:'🦞',color:'#fff0f3'},
    chat:{label:'对话 & 推理',sub:'大模型问答 · 内容创作 · AI 搜索',icon:'💬',color:'#eff6ff'},
    knowledge:{label:'知识库 & 协作',sub:'团队知识沉淀 · AI 问答 · 文档协作',icon:'📚',color:'#f5f3ff'},
    image:{label:'图像 & 视频 & PPT',sub:'AI 生图 · 视频生成 · AI 演示',icon:'🎨',color:'#fffbeb'},
    efficiency:{label:'效率 & 数据',sub:'会议纪要 · 舆情监控 · 数据搜索',icon:'⚡',color:'#f0fdf4'}
  };
  if (currentGroup==='all') {
    Object.keys(GINFO).forEach(g => { groups[g] = { info: GINFO[g], tools: tools.filter(t=>t.group===g) }; });
  } else {
    groups[currentGroup] = { info: GINFO[currentGroup], tools };
  }
  return groups;
}

function renderToolGroups() {
  const container = document.getElementById('toolGroups');
  const groups = getGroupedTools();
  container.innerHTML = Object.entries(groups).map(([key,{info,tools}]) => {
    if (!tools.length) return '';
    return `<div class="group-section">
      <div class="group-header">
        <div class="group-icon" style="background:${info.color};">${info.icon}</div>
        <div><div class="group-title">${info.label}</div><div style="font-size:12px;color:var(--text-sub);">${info.sub}</div></div>
        <span class="group-count">${tools.length} 个工具</span>
      </div>
      <div class="tools-grid">
        ${tools.map(t=>buildCard(t)).join('')}
      </div>
    </div>`;
  }).join('');
  // Update selected state
  document.querySelectorAll('.tool-card').forEach(card => {
    if (selectedIds.includes(card.dataset.id)) {
      card.classList.add('selected');
      card.querySelector('.select-checkbox').classList.add('checked');
      card.querySelector('.check-mark').style.display='block';
    }
  });
}

function buildCard(tool) {
  const tags = (tool.tags||[]).map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join('');
  const scoreItems = Object.entries(SCORE_LABELS).slice(0,3).map(([k,lbl],i) => {
    const val = tool.scores[k];
    const pct = val/5*100;
    return `<div class="score-row">
      <span class="score-lbl">${lbl}</span>
      <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${SCORE_COLORS[i]};"></div></div>
      <span class="score-val" style="color:${SCORE_COLORS[i]};">${val}</span>
    </div>`;
  }).join('');
  return `<div class="tool-card" data-id="${tool.id}">
    <div class="select-overlay">
      <div class="select-checkbox" onclick="toggleSelect('${tool.id}',event)"><span class="check-mark">✓</span></div>
    </div>
    <div class="card-top">
      <div class="card-icon">${tool.icon}</div>
      <div class="card-head">
        <div class="card-name">${tool.name}</div>
        <div class="card-tag-row">${tags}</div>
      </div>
    </div>
    <div class="card-desc">${tool.desc}</div>
    <div class="card-scores">${scoreItems}</div>
    <div class="card-footer">
      <a class="card-btn card-btn-primary" href="${tool.links[0].url}" target="_blank" rel="noopener">🚀 打开</a>
      <button class="card-btn card-btn-ghost" onclick="showModal('${tool.id}')">详情</button>
    </div>
  </div>`;
}

function toggleSelect(id, event) {
  event.stopPropagation();
  const idx = selectedIds.indexOf(id);
  if (idx >= 0) {
    selectedIds.splice(idx, 1);
  } else {
    if (selectedIds.length >= 5) { alert('最多同时对比 5 个工具'); return; }
    selectedIds.push(id);
  }
  // Update card UI
  document.querySelectorAll(`.tool-card[data-id="${id}"]`).forEach(card => {
    const inSel = selectedIds.includes(id);
    card.classList.toggle('selected', inSel);
    card.querySelectorAll('.select-checkbox').forEach(cb => {
      cb.classList.toggle('checked', inSel);
      cb.querySelector('.check-mark').style.display = inSel ? 'block' : 'none';
    });
  });
  updateCompareBar();
}
window.toggleSelect = toggleSelect;

function updateCompareBar() {
  const sel = document.getElementById('compareSelected');
  const empty = document.getElementById('compareEmpty');
  if (selectedIds.length === 0) {
    sel.innerHTML = '<span class="compare-empty" id="compareEmpty">👆 勾选工具后点击"开始对比"</span>';
  } else {
    sel.innerHTML = selectedIds.map(id => {
      const t = TOOLS.find(x=>x.id===id);
      return `<div class="compare-chip">${t.icon} ${t.name}<div class="compare-chip-remove" onclick="toggleSelect('${id}',event)">×</div></div>`;
    }).join('');
  }
}

function clearCompare() {
  selectedIds = [];
  document.querySelectorAll('.tool-card').forEach(c => {
    c.classList.remove('selected');
    c.querySelectorAll('.select-checkbox').forEach(cb=>{cb.classList.remove('checked');cb.querySelector('.check-mark').style.display='none';});
  });
  updateCompareBar();
  document.getElementById('compareResult').innerHTML = '';
}
window.clearCompare = clearCompare;

function doCompare() {
  if (selectedIds.length < 2) { alert('请至少选择 2 个工具进行对比'); return; }
  const tools = selectedIds.map(id => TOOLS.find(t=>t.id===id));
  const scoreKeys = Object.keys(SCORE_LABELS);

  // 找出各维度最高分
  const maxScores = {};
  scoreKeys.forEach(k => { maxScores[k] = Math.max(...tools.map(t=>t.scores[k])); });

  function stars(val) {
    return [...Array(5)].map((_,i)=>`<span class="${i<val?'star-fill':'star-empty'}">★</span>`).join('');
  }
  function dots(val, isMax) {
    return `<div class="score-dots">${[...Array(5)].map((_,i)=>`<div class="${i<val?'sdot-fill':'sdot-empty'}" style="${i<val&&isMax?'background:#f59e0b;':''};"></div>`).join('')}</div>`;
  }

  // 总结推荐
  const overall = tools.map(t => ({id:t.id, name:t.name, icon:t.icon, sum: Object.values(t.scores).reduce((a,b)=>a+b,0)}));
  const winner = overall.sort((a,b)=>b.sum-a.sum)[0];

  const tableHTML = `
    <div class="compare-table-section">
      <div class="compare-table-title">⚖️ 工具对比：${tools.map(t=>t.icon+' '+t.name).join(' vs ')}</div>
      <div style="overflow-x:auto;">
      <table class="compare-table">
        <thead>
          <tr>
            <th style="min-width:100px;">对比维度</th>
            ${tools.map(t=>`<th class="tool-col">${t.icon} ${t.name}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="compare-row-label">适用场景</td>
            ${tools.map(t=>`<td style="font-size:12px;color:var(--text-sub);">${t.desc.slice(0,40)}...</td>`).join('')}
          </tr>
          <tr>
            <td class="compare-row-label">使用权限</td>
            ${tools.map(t=>`<td><span style="font-size:12px;font-weight:600;">${t.access}</span></td>`).join('')}
          </tr>
          <tr>
            <td class="compare-row-label">费用</td>
            ${tools.map(t=>`<td style="font-size:12px;">${t.cost}</td>`).join('')}
          </tr>
          ${scoreKeys.map((k,i) => `<tr>
            <td class="compare-row-label">${SCORE_LABELS[k]}</td>
            ${tools.map(t=>`<td>
              ${dots(t.scores[k], t.scores[k]===maxScores[k])}
              ${t.scores[k]===maxScores[k]?`<span class="winner-badge">最高</span>`:''}
            </td>`).join('')}
          </tr>`).join('')}
          <tr style="background:var(--primary-light);">
            <td class="compare-row-label" style="font-weight:800;color:var(--text);">综合评分</td>
            ${tools.map(t=>{
              const sum = Object.values(t.scores).reduce((a,b)=>a+b,0);
              const isWinner = t.id===winner.id;
              return `<td><span style="font-size:18px;font-weight:800;color:${isWinner?'var(--orange)':'var(--text-sub)'};">${sum}</span>${isWinner?'<span class="winner-badge" style="background:var(--orange-light);color:var(--orange);">推荐</span>':''}</td>`;
            }).join('')}
          </tr>
        </tbody>
      </table>
      </div>
      <div class="recommend-banner">
        <div class="recommend-icon">💡</div>
        <div class="recommend-text">
          <strong>推荐选择：${winner.icon} ${winner.name}</strong> — 综合评分最高（${winner.sum}/25）<br/>
          当然，最适合的工具取决于你的具体使用场景。点击各工具卡片查看使用技巧，结合自身需求做最终决策。
        </div>
      </div>
    </div>`;

  const result = document.getElementById('compareResult');
  result.innerHTML = tableHTML;
  result.scrollIntoView({behavior:'smooth', block:'start'});
}
window.doCompare = doCompare;

// Modal
const overlay = document.getElementById('modalOverlay');
window.showModal = function(id) {
  const t = TOOLS.find(x=>x.id===id);
  if (!t) return;
  document.getElementById('modalIcon').textContent = t.icon;
  document.getElementById('modalName').textContent = t.name;
  document.getElementById('modalTags').innerHTML = (t.tags||[]).map(tg=>`<span class="tag ${tg.cls}">${tg.text}</span>`).join('');
  document.getElementById('modalDesc').textContent = t.fullDesc;
  document.getElementById('modalTip').textContent = t.tip;
  document.getElementById('modalLinks').innerHTML = t.links.map((l,i)=>`
    <a class="modal-link ${i===0?'p':''}" href="${l.url}" target="_blank" rel="noopener">
      <div class="modal-link-icon">${l.icon}</div>
      <div class="modal-link-body"><div class="modal-link-label">${l.label}</div><div class="modal-link-url">${l.url}</div></div>
      <div class="modal-link-arrow">↗</div>
    </a>`).join('');
  overlay.classList.add('open'); document.body.style.overflow='hidden';
};
function closeModal(){overlay.classList.remove('open');document.body.style.overflow='';}
document.getElementById('modalClose').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

renderToolGroups();
</script>
</body>
</html>
