<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AI 工具图鉴 · 鹅厂运营版</title>
<style>
/* ── Reset & Variables ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --surface-hover: #f9fafb;
  --border: #e8eaed;
  --border-light: #f0f2f5;
  --text-primary: #1a1d23;
  --text-secondary: #5f6368;
  --text-muted: #9aa0a6;
  --accent: #1a73e8;
  --accent-light: #e8f0fe;
  --accent-hover: #1557b0;
  --shadow-xs: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
  --shadow-md: 0 8px 24px rgba(0,0,0,.09), 0 3px 8px rgba(0,0,0,.05);
  --shadow-lg: 0 20px 60px rgba(0,0,0,.12), 0 8px 20px rgba(0,0,0,.06);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
  --transition: 160ms cubic-bezier(.4,0,.2,1);

  /* Category colors */
  --c1a-color: #ff5722; --c1a-bg: #fff3e0; --c1a-light: #fff8f0;
  --c1b-color: #1a73e8; --c1b-bg: #e8f0fe; --c1b-light: #f0f6ff;
  --c2-color: #0f9d58;  --c2-bg: #e6f4ea;  --c2-light: #f0faf3;
  --c3-color: #9c27b0;  --c3-bg: #f3e5f5;  --c3-light: #f9f0fc;
  --c4-color: #f4511e;  --c4-bg: #fce4ec;  --c4-light: #fff0f3;
}
html { font-size: 16px; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
a { text-decoration: none; color: inherit; }
button { font-family: var(--font); border: none; cursor: pointer; background: none; outline: none; }
img { display: block; max-width: 100%; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: var(--shadow-xs);
}
.header-inner {
  max-width: 1200px; margin: 0 auto;
  height: 60px;
  display: flex; align-items: center; gap: 16px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  user-select: none;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #ff5722, #e91e63);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 3px 10px rgba(255,87,34,.25);
}
.logo-text { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.logo-text span { color: var(--text-muted); font-weight: 400; margin-left: 4px; font-size: 13px; }
.header-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.search-wrap {
  flex: 1; max-width: 360px;
  position: relative;
}
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); display: flex; pointer-events: none;
}
.search-input {
  width: 100%; height: 38px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--bg);
  padding: 0 36px 0 38px;
  font-size: 14px; color: var(--text-primary);
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
  outline: none;
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,115,232,.1);
  background: var(--surface);
}
.search-input::placeholder { color: var(--text-muted); }
.search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--text-muted); color: #fff;
  font-size: 11px; font-weight: 700;
  display: none; align-items: center; justify-content: center;
  cursor: pointer; transition: background var(--transition);
}
.search-clear:hover { background: var(--text-secondary); }
.search-clear.show { display: flex; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.tool-count {
  font-size: 12px; color: var(--text-muted);
  background: var(--bg); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px;
  white-space: nowrap;
}

/* ── Layout ── */
.layout {
  max-width: 1200px; margin: 0 auto;
  padding: 24px 24px 60px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  align-items: start;
}

/* ── Sidebar ── */
.sidebar {
  position: sticky; top: 84px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px 8px;
  box-shadow: var(--shadow-xs);
}
.sidebar-title {
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .6px;
  padding: 6px 12px 10px;
}
.cat-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 500; color: var(--text-secondary);
  transition: all var(--transition);
  cursor: pointer;
  position: relative;
}
.cat-btn:hover { background: var(--bg); color: var(--text-primary); }
.cat-btn.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 600;
}
.cat-btn-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
.cat-btn-label { flex: 1; text-align: left; line-height: 1.3; }
.cat-btn-count {
  font-size: 11px; font-weight: 600;
  padding: 2px 7px; border-radius: 20px;
  background: var(--border-light); color: var(--text-muted);
  flex-shrink: 0;
}
.cat-btn.active .cat-btn-count {
  background: rgba(26,115,232,.12); color: var(--accent);
}
.sidebar-divider { height: 1px; background: var(--border-light); margin: 8px 12px; }

/* ── Main Content ── */
.main { min-width: 0; }

/* Hero Banner */
.hero {
  background: linear-gradient(135deg, #1a1d23 0%, #2d3748 100%);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  margin-bottom: 24px;
  position: relative; overflow: hidden;
  color: #fff;
}
.hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 200px; height: 200px; border-radius: 50%;
  background: rgba(26,115,232,.15);
}
.hero::after {
  content: '';
  position: absolute; bottom: -60px; right: 60px;
  width: 150px; height: 150px; border-radius: 50%;
  background: rgba(233,30,99,.1);
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px; padding: 4px 12px;
  font-size: 12px; color: rgba(255,255,255,.8);
  margin-bottom: 12px;
}
.hero-title { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; position: relative; z-index: 1; }
.hero-desc { font-size: 13.5px; color: rgba(255,255,255,.65); line-height: 1.6; position: relative; z-index: 1; max-width: 500px; }
.hero-stats {
  display: flex; gap: 20px; margin-top: 20px;
  position: relative; z-index: 1;
}
.hero-stat-item { text-align: center; }
.hero-stat-num { font-size: 22px; font-weight: 800; color: #fff; line-height: 1; }
.hero-stat-label { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 3px; }

/* Section */
.section { margin-bottom: 32px; }
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-light);
}
.section-icon {
  width: 34px; height: 34px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.section-icon.c1a { background: var(--c1a-bg); }
.section-icon.c1b { background: var(--c1b-bg); }
.section-icon.c2  { background: var(--c2-bg); }
.section-icon.c3  { background: var(--c3-bg); }
.section-icon.c4  { background: var(--c4-bg); }
.section-info { flex: 1; }
.section-title { font-size: 16px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
.section-subtitle { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
.section-cnt {
  font-size: 12px; color: var(--text-muted);
  background: var(--bg); border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 20px; flex-shrink: 0;
}

/* ── Tool Grid ── */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

/* ── Tool Card ── */
.tool-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
  display: flex; flex-direction: column; gap: 10px;
  position: relative;
  overflow: hidden;
}
.tool-card:hover {
  border-color: #c8d6f0;
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.tool-card:active { transform: translateY(0); }
.tool-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  opacity: 0;
  transition: opacity var(--transition);
}
.tool-card:hover::before { opacity: 1; }
.tool-card[data-cat="c1a"]::before { background: linear-gradient(90deg, var(--c1a-color), #ff9800); }
.tool-card[data-cat="c1b"]::before { background: linear-gradient(90deg, var(--c1b-color), #00bcd4); }
.tool-card[data-cat="c2"]::before  { background: linear-gradient(90deg, var(--c2-color), #4caf50); }
.tool-card[data-cat="c3"]::before  { background: linear-gradient(90deg, var(--c3-color), #e91e63); }
.tool-card[data-cat="c4"]::before  { background: linear-gradient(90deg, #f4511e, #ff9800); }

.card-header { display: flex; align-items: flex-start; gap: 12px; }
.card-icon {
  width: 42px; height: 42px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.tool-card[data-cat="c1a"] .card-icon { background: var(--c1a-light); }
.tool-card[data-cat="c1b"] .card-icon { background: var(--c1b-light); }
.tool-card[data-cat="c2"]  .card-icon { background: var(--c2-light); }
.tool-card[data-cat="c3"]  .card-icon { background: var(--c3-light); }
.tool-card[data-cat="c4"]  .card-icon { background: #fff5f0; }

.card-header-info { flex: 1; min-width: 0; }
.card-name { font-size: 14.5px; font-weight: 700; color: var(--text-primary); line-height: 1.3; margin-bottom: 5px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  font-size: 11px; font-weight: 600;
  padding: 2px 7px; border-radius: 4px;
  line-height: 1.5;
}
.tag-claw  { background: #fff3e0; color: #e65100; }
.tag-inner { background: #e8f0fe; color: #1a73e8; }
.tag-free  { background: #e6f4ea; color: #0f9d58; }
.tag-hot   { background: #fce4ec; color: #c2185b; }
.tag-new   { background: #f3e5f5; color: #7b1fa2; }
.tag-rec   { background: #e0f7fa; color: #00796b; }

.card-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  flex: 1;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 10px;
  border-top: 1px solid var(--border-light);
  margin-top: auto;
}
.card-link-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12.5px; font-weight: 600; color: var(--accent);
  padding: 5px 10px; border-radius: 6px;
  background: var(--accent-light);
  transition: background var(--transition);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px;
}
.card-link-btn:hover { background: #d2e3fc; }
.card-detail-btn {
  font-size: 12px; color: var(--text-muted);
  padding: 5px 8px; border-radius: 6px;
  transition: color var(--transition), background var(--transition);
  display: flex; align-items: center; gap: 3px;
  flex-shrink: 0;
}
.card-detail-btn:hover { color: var(--text-primary); background: var(--bg); }
mark { background: #fff176; color: inherit; border-radius: 2px; padding: 0 1px; }

/* ── Modal Overlay ── */
.overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 200ms ease;
}
.overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-xl);
  width: 100%; max-width: 540px;
  max-height: 85vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: scale(.95) translateY(10px);
  transition: transform 220ms cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
.overlay.show .modal { transform: scale(1) translateY(0); }
.modal-top {
  padding: 28px 28px 0;
  position: sticky; top: 0;
  background: var(--surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  z-index: 1;
}
.modal-header {
  display: flex; align-items: flex-start; gap: 14px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-light);
}
.modal-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}
.modal-icon.c1a { background: var(--c1a-light); }
.modal-icon.c1b { background: var(--c1b-light); }
.modal-icon.c2  { background: var(--c2-light); }
.modal-icon.c3  { background: var(--c3-light); }
.modal-icon.c4  { background: #fff5f0; }
.modal-meta { flex: 1; min-width: 0; }
.modal-name { font-size: 18px; font-weight: 800; color: var(--text-primary); margin-bottom: 7px; line-height: 1.3; }
.modal-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.modal-close {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--bg); color: var(--text-secondary);
  font-size: 14px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition), color var(--transition);
  flex-shrink: 0;
}
.modal-close:hover { background: var(--border); color: var(--text-primary); }
.modal-body { padding: 20px 28px 28px; }
.modal-full-desc {
  font-size: 14px; color: var(--text-secondary); line-height: 1.75;
  margin-bottom: 20px;
}
.modal-section-label {
  font-size: 11px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .6px;
  margin-bottom: 10px;
}
.modal-links { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.modal-link {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  font-size: 13.5px; font-weight: 500; color: var(--text-primary);
  transition: all var(--transition);
  cursor: pointer;
}
.modal-link:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.modal-link.primary {
  background: var(--accent); color: #fff; border-color: var(--accent);
  font-weight: 600;
}
.modal-link.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.modal-link-icon { font-size: 16px; flex-shrink: 0; }
.modal-link-arrow { margin-left: auto; opacity: .5; font-size: 12px; }
.modal-tip {
  background: #fffde7; border: 1px solid #fff176;
  border-radius: var(--radius-sm); padding: 12px 14px;
  font-size: 13px; color: #5f4c00; line-height: 1.65;
}

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 80px 20px;
  display: none;
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: .5; }
.empty-state-title { font-size: 17px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state-desc { font-size: 14px; color: var(--text-muted); }

/* ── Token Banner ── */
.token-banner {
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, #e8f0fe, #f3e5f5);
  border: 1px solid #c8d6f0; border-radius: var(--radius);
  padding: 12px 16px; margin-bottom: 16px;
  font-size: 13px; color: var(--text-secondary);
}
.token-banner-icon { font-size: 20px; flex-shrink: 0; }
.token-banner a { color: var(--accent); font-weight: 600; }

/* ── Footer ── */
.footer {
  text-align: center; padding: 32px 24px;
  font-size: 12.5px; color: var(--text-muted);
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.footer a { color: var(--accent); }

/* ── Responsive ── */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; padding: 16px; gap: 16px; }
  .sidebar { position: static; display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; }
  .sidebar-title { display: none; }
  .sidebar-divider { display: none; }
  .cat-btn { width: auto; flex: 0 0 auto; padding: 7px 12px; font-size: 13px; }
  .cat-btn-icon { font-size: 14px; width: auto; }
  .cat-btn-count { display: none; }
  .hero { padding: 20px; }
  .hero-title { font-size: 18px; }
  .hero-stats { gap: 16px; }
  .tool-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
}
@media (max-width: 600px) {
  .header-inner { height: 54px; padding: 0; gap: 10px; }
  .header { padding: 0 14px; }
  .logo-text span { display: none; }
  .header-divider { display: none; }
  .search-wrap { max-width: none; }
  .tool-count { display: none; }
  .tool-grid { grid-template-columns: 1fr; }
  .modal { border-radius: var(--radius-lg); }
  .modal-top, .modal-body { padding-left: 20px; padding-right: 20px; }
  .hero-stats { display: none; }
  .token-banner { font-size: 12px; }
}
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🦞</div>
      <div class="logo-text">AI 工具图鉴 <span>Vol.1 · 鹅厂运营版</span></div>
    </div>
    <div class="header-divider"></div>
    <div class="search-wrap">
      <div class="search-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <input class="search-input" id="searchInput" type="text" placeholder="搜索工具、场景、功能…" autocomplete="off" spellcheck="false">
      <div class="search-clear" id="searchClear">✕</div>
    </div>
    <div class="header-right">
      <div class="tool-count" id="toolCount">收录 <strong>35</strong> 个工具</div>
    </div>
  </div>
</header>

<!-- ── Layout ── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">工具分类</div>
    <button class="cat-btn active" data-cat="all">
      <span class="cat-btn-icon">🌐</span>
      <span class="cat-btn-label">全部工具</span>
      <span class="cat-btn-count" id="cnt-all">0</span>
    </button>
    <div class="sidebar-divider"></div>
    <button class="cat-btn" data-cat="c1a">
      <span class="cat-btn-icon">🦞</span>
      <span class="cat-btn-label">龙虾家族</span>
      <span class="cat-btn-count" id="cnt-c1a">0</span>
    </button>
    <button class="cat-btn" data-cat="c1b">
      <span class="cat-btn-icon">💬</span>
      <span class="cat-btn-label">对话助手</span>
      <span class="cat-btn-count" id="cnt-c1b">0</span>
    </button>
    <button class="cat-btn" data-cat="c2">
      <span class="cat-btn-icon">🧠</span>
      <span class="cat-btn-label">知识库管理</span>

(function () {
  'use strict';

  let currentCat = 'all';
  let searchQuery = '';

  // Count per category
  const counts = { all: TOOLS.length };
  Object.keys(CATS).forEach(k => {
    counts[k] = TOOLS.filter(t => t.cat === k).length;
  });

  // Update count badges
  document.getElementById('cnt-all').textContent = counts.all;
  Object.keys(CATS).forEach(k => {
    const el = document.getElementById('cnt-' + k);
    if (el) el.textContent = counts[k];
  });
  document.getElementById('toolCount').innerHTML = '收录 <strong>' + counts.all + '</strong> 个工具';
  document.getElementById('statTotal').textContent = counts.all;

  // ── Highlight ──
  function hl(text, q) {
    if (!q || !text) return text || '';
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return String(text).replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
  }

  // ── Match filter ──
  function matchTool(tool, q) {
    if (!q) return true;
    const haystack = [tool.name, tool.desc, tool.fullDesc, tool.tip || '', ...tool.tags.map(t => t.text)].join(' ').toLowerCase();
    return haystack.includes(q.toLowerCase());
  }

  // ── Build Card ──
  function buildCard(tool, q) {
    const tags = tool.tags.map(t => `<span class="tag ${t.cls}">${t.text}</span>`).join('');
    const primaryLink = tool.links[0];
    return `<div class="tool-card" data-id="${tool.id}" data-cat="${tool.cat}" role="button" tabindex="0" onclick="openModal('${tool.id}')">
      <div class="card-header">
        <div class="card-icon">${tool.icon}</div>
        <div class="card-header-info">
          <div class="card-name">${hl(tool.name, q)}</div>
          <div class="card-tags">${tags}</div>
        </div>
      </div>
      <div class="card-desc">${hl(tool.desc, q)}</div>
      <div class="card-footer">
        <a class="card-link-btn" href="${primaryLink.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          直达
        </a>
        <button class="card-detail-btn" onclick="event.stopPropagation(); openModal('${tool.id}')">
          详情
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>`;
  }

  // ── Build Section ──
  function buildSection(catKey, tools, q) {
    const cat = CATS[catKey];
    const cards = tools.map(t => buildCard(t, q)).join('');
    return `<section class="section" id="sec-${catKey}">
      <div class="section-header">
        <div class="section-icon ${catKey}">${cat.icon}</div>
        <div class="section-info">
          <div class="section-title">${cat.label}</div>
          <div class="section-subtitle">${cat.desc}</div>
        </div>
        <div class="section-cnt">${tools.length} 个</div>
      </div>
      ${catKey === 'c1a' ? `<div class="token-banner"><span class="token-banner-icon">📊</span><span>龙虾工具均有 Token 用量记录，可在 <a href="https://tokens.woa.com" target="_blank">tokens.woa.com</a> 查看消耗详情。</span></div>` : ''}
      <div class="tool-grid">${cards}</div>
    </section>`;
  }

  // ── Render ──
  function render() {
    const q = searchQuery.trim();
    let html = '';
    let total = 0;

    Object.keys(CATS).forEach(catKey => {
      if (currentCat !== 'all' && currentCat !== catKey) return;
      const tools = TOOLS.filter(t => t.cat === catKey && matchTool(t, q));
      if (tools.length === 0) return;
      html += buildSection(catKey, tools, q);
      total += tools.length;
    });

    document.getElementById('sections').innerHTML = html;
    document.getElementById('emptyState').style.display = total === 0 ? 'block' : 'none';
  }

  // ── Category filter ──
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // ── Search ──
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');

  searchInput.addEventListener('input', () => {
    searchQuery = searchInput.value;
    searchClear.classList.toggle('show', searchQuery.length > 0);
    render();
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    searchClear.classList.remove('show');
    searchInput.focus();
    render();
  });

  // ── Modal ──
  const overlay = document.getElementById('overlay');
  const modalIcon = document.getElementById('modalIcon');
  const modalName = document.getElementById('modalName');
  const modalTags = document.getElementById('modalTags');
  const modalDesc = document.getElementById('modalDesc');
  const modalLinks = document.getElementById('modalLinks');
  const modalTipWrap = document.getElementById('modalTipWrap');

  window.openModal = function(id) {
    const tool = TOOLS.find(t => t.id === id);
    if (!tool) return;

    modalIcon.className = 'modal-icon ' + tool.cat;
    modalIcon.textContent = tool.icon;
    modalName.textContent = tool.name;
    modalTags.innerHTML = tool.tags.map(t => `<span class="tag ${t.cls}">${t.text}</span>`).join('');
    modalDesc.textContent = tool.fullDesc;

    modalLinks.innerHTML = tool.links.map(l =>
      `<a class="modal-link ${l.primary ? 'primary' : ''}" href="${l.url}" target="_blank" rel="noopener">
        <span class="modal-link-label">${l.label}</span>
        <svg class="modal-link-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>`
    ).join('');

    modalTipWrap.innerHTML = tool.tip ? `<div class="modal-tip">${tool.tip}</div>` : '';

    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  };

  function closeModal() {
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });

  // ── Keyboard nav for cards ──
  document.addEventListener('keydown', e => {
    if (e.target.classList.contains('tool-card') && e.key === 'Enter') {
      e.target.click();
    }
  });

  // Initial render
  render();
})();
</script>
</body>
</html>
